description: |
  Microchip XEC capture compare timer used as Zephyr's kernel timer

compatible: "microchip,xec-cct-ktimer"

include: ["base.yaml", "microchip,dmec-ecia-girq.yaml"]

properties:
  reg:
    required: true

  interrupts:
    required: true

  pcr-scr:
    type: int
    required: true
    description: |
      Encoded PCR register index and bit position for sleep enable,
      clock required, and peripheral reset.

  input-clock:
    type: int
    required: true
    const: 48000000
    description: Capture compare timer input frequency
